# Workflow to build and publish Watermelon Android Release APKs
name: Auto Release Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Create local.properties from secrets
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> local.properties
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> local.properties
          echo "PODCAST_INDEX_API_KEY=${{ secrets.PODCAST_INDEX_API_KEY }}" >> local.properties
          echo "PODCAST_INDEX_SECRET=${{ secrets.PODCAST_INDEX_SECRET }}" >> local.properties
          echo "JAMENDO_CLIENT_ID=${{ secrets.JAMENDO_CLIENT_ID }}" >> local.properties
          echo "WATERMELON_API_URL=${{ secrets.WATERMELON_API_URL }}" >> local.properties
          echo "--- local.properties created ---"
          cat local.properties | head -c 200

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Auto-Bump Version
        id: bump
        run: |
          python -c '
          import os
          import re

          with open("app/build.gradle.kts", "r") as f:
              content = f.read()

          code_match = re.search(r"versionCode\s*=\s*(\d+)", content)
          name_match = re.search(r"versionName\s*=\s*\"([^\"]+)\"", content)

          if code_match and name_match:
              old_code = int(code_match.group(1))
              new_code = old_code + 1
              
              old_name = name_match.group(1)
              parts = old_name.split(".")
              if len(parts) == 3:
                  new_patch = int(parts[2]) + 1
                  new_name = f"{parts[0]}.{parts[1]}.{new_patch}"
              else:
                  new_name = old_name
                  
              content = re.sub(r"versionCode\s*=\s*\d+", f"versionCode = {new_code}", content)
              content = re.sub(r"versionName\s*=\s*\"[^\"]+\"", f"versionName = \"{new_name}\"", content)
              
              with open("app/build.gradle.kts", "w") as f:
                  f.write(content)
                  
              print(f"Bumped version from {old_name} ({old_code}) to {new_name} ({new_code})")
              with open(os.environ["GITHUB_OUTPUT"], "a") as go:
                  go.write(f"new_version={new_name}\n")
          else:
              print("Version code/name not found!")
              exit(1)
          '

      - name: Commit and Push Version Bump
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "Bump version to v${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get Head Commit Message
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          MSG="${{ steps.commit.outputs.message }}"
          
          # Create tag locally and push
          git tag "v$VERSION"
          git push origin "v$VERSION"
          
          # Create GitHub release and upload the release APK
          gh release create "v$VERSION" app/build/outputs/apk/release/app-release.apk \
            --title "Release v$VERSION" \
            --notes "$MSG"
